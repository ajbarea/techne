[project]
site_name = "techne"
site_description = "Nine Claude Code skills. One /plugin install. Sister-repo hygiene, audit pipelines, doc/code drift checks, and CI noise control."
site_author = "AJ Barea"
site_url = "https://ajbarea.github.io/techne/"
repo_url = "https://github.com/ajbarea/techne"
repo_name = "ajbarea/techne"
copyright = "AJ Barea · 2026"

extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Skills" = [
      { "Overview" = "skills/index.md" },
      { "audit" = "skills/audit.md" },
      { "auto-commit" = "skills/auto-commit.md" },
      { "ci-audit" = "skills/ci-audit.md" },
      { "deslop" = "skills/deslop.md" },
      { "docs-site" = "skills/docs-site.md" },
      { "docsync" = "skills/docsync.md" },
      { "reslop" = "skills/reslop.md" },
      { "sisters" = "skills/sisters.md" },
      { "theoros" = "skills/theoros.md" },
  ]},
  { "Configuration" = "configuration.md" },
]

[project.theme]
name = "material"
language = "en"
font.text = "Inter"
font.code = "JetBrains Mono"
icon.logo = "material/hammer-wrench"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.suggest",
    "search.share",
]

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[project.plugins]
search = { engine = "disco" }
social = {}

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ajbarea/techne"
name = "techne on GitHub"
