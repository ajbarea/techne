name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync

      - name: Manifests parse as JSON
        run: |
          jq empty .claude-plugin/marketplace.json
          jq empty plugins/techne/.claude-plugin/plugin.json

      - name: SKILL.md frontmatter is well-formed
        run: uv run python scripts/validate_skill_frontmatter.py

      - name: Ruff lint + format check (scripts/)
        run: |
          uv run ruff check scripts/
          uv run ruff format --check scripts/

      - name: Shellcheck (scripts/*.sh)
        # ubuntu-latest ships shellcheck, no install needed.
        # --severity=warning filters out SC2016-style info-level findings (e.g.
        # "expressions don't expand in single quotes" where single-quoting is
        # intentional). Warnings + errors still gate the build.
        run: shellcheck --severity=warning scripts/*.sh

      - name: No stale ~/.claude/skills/_shared paths
        run: |
          if grep -rn '\.claude/skills/_shared' plugins/techne/skills/; then
            echo "FAIL: SKILL.md still references the old absolute _shared path"
            exit 1
          fi

      - name: No legacy aj-* skill name references
        run: |
          if grep -rohE 'aj-(audit|auto-commit|ci-audit|deslop|docs-site|docsync|reslop|sisters)' plugins/techne/skills/; then
            echo "FAIL: SKILL.md still references aj-* names"
            exit 1
          fi
